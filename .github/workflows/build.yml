name: build-mod

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ForgeGradle for 1.20.1 requires Gradle 8.x (not 9+), so pin it.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.8'

      - name: Build
        run: gradle build --no-daemon

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: runway-companion-jar
          path: build/libs/*.jar
